<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bar, Wine & Restaurant Raíces de Segovia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Georgia", serif;
            background-color: #faf7f2;
            color: #333;
        }

        /* Top title bar */
        header {
            background-color: #3b2f2f;
            color: #f5f0e6;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 1px;
        }

        header p {
            margin-top: 10px;
            font-size: 1.2rem;
            font-style: italic;
            color: #d6cbb8;
        }

        /* Body / Carta section */
        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        section {
            margin-bottom: 50px;
        }

        section h2 {
            border-bottom: 2px solid #3b2f2f;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .menu-item {
            margin-bottom: 15px;
        }

        .menu-item span {
            float: right;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 30px 10px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bar, Wine & Restaurant</h1>
        <p>Raíces de Segovia</p>
    </header>

    <main>
        <section>
            <h2>Carta</h2>

            <div class="menu-item">
                <strong>Dish name</strong>
                <span>€12</span>
                <p>Short description of the dish.</p>
            </div>

            <div class="menu-item">
                <strong>Dish name</strong>
                <span>€9</span>
                <p>Short description of the dish.</p>
            </div>

            <div class="menu-item">
                <strong>Wine name</strong>
                <span>€18</span>
                <p>Region / grape variety.</p>
            </div>

        </section>
    </main>

    <footer>
        © 2026 Raíces de Segovia · Segovia, España
    </footer>

</body>
</html>
